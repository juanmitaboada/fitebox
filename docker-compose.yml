services:
  # RECORDING SERVICE
  recorder:
    build:
      context: .
      dockerfile: docker/recorder/Dockerfile
    container_name: fitebox-recorder
    privileged: true
    network_mode: host
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 32768
        hard: 32768
    shm_size: '256m'

    # Volume mounts
    volumes:
      # Core mounts
      - ./recordings:/recordings
      - ./config:/config
      - ./data:/fitebox/data

      # All device nodes, live-mounted: survives USB re-enumeration so audio
      # cards that disconnect/reconnect (or change card number) stay visible to
      # the container without a restart. Replaces the static devices: block
      # (which froze the node mapping at startup) and includes /dev/snd,
      # /dev/video*, /dev/i2c-1, /dev/gpiochip0 and /dev/bus/usb.
      - /dev:/dev

      # System access (for diagnostics)
      - /proc:/host/proc:ro            # System info
      - /sys:/host/sys:ro              # Hardware info
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket # DBUS

      # Runtime
      - /run/plymouth:/run/plymouth
      - /tmp:/host/tmp                 # Shared temp (for logs)

      # Fitebox
      - ./log:/fitebox/log

      # Updates
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/fitebox/project
      # SSH keys (optional - for git operations)
      - type: bind
        source: ${SSH_DIR:-./.ssh}
        target: /root/.ssh
        read_only: true
        bind:
          create_host_path: true

    # Unidades temporales
    tmpfs:
    - /fitebox/run

    # Environment
    environment:
      - DISPLAY=:0
      - PYTHONUNBUFFERED=1
      - RECORDING_PATH=/recordings
      - HOST_PROC=/host/proc  # For diagnostic script
      - HOST_SYS=/host/sys
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}

    expose:
      - "8080"
    restart: unless-stopped

  # HTTPS
  proxy:
    image: nginx:alpine
    container_name: fitebox_proxy
    network_mode: host
    stop_grace_period: 1s
    volumes:
      - ./docker/recorder/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - recorder
    restart: always
