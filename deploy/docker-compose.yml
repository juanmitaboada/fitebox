# =============================================================
# FITEBOX - Production Deploy (pre-built image)
# =============================================================
# Usage:
#   1. Run setup.sh on the Raspberry Pi 5 (see README)
#   2. Place this file + nginx.conf in your fitebox directory
#   3. docker compose pull && docker compose up -d
#
# Image available at:
#   - ghcr.io/juanmitaboada/fitebox
#   - docker.io/juanmitaboada/fitebox
# =============================================================

services:
  # RECORDING SERVICE (pre-built image)
  recorder:
    image: ghcr.io/juanmitaboada/fitebox:latest
    container_name: fitebox-recorder
    privileged: true
    network_mode: host
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 32768
        hard: 32768
    shm_size: '256m'

    # Device access
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
      - /dev/snd:/dev/snd
      - /dev/i2c-1:/dev/i2c-1
      - /dev/gpiochip0:/dev/gpiochip0
    device_cgroup_rules:
      - 'c 81:* rmw'

    # Volume mounts
    volumes:
      # Core mounts
      - ./recordings:/recordings
      - ./config:/config
      - ./data:/fitebox/data

      # System access (for diagnostics)
      - /dev/bus/usb:/dev/bus/usb:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket

      # Runtime
      - /run/plymouth:/run/plymouth
      - /tmp:/host/tmp

      # Fitebox
      - ./log:/fitebox/log

    # Temp filesystem
    tmpfs:
      - /fitebox/run

    # Environment
    environment:
      - DISPLAY=:0
      - PYTHONUNBUFFERED=1
      - RECORDING_PATH=/recordings
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}

    expose:
      - "8080"
    restart: unless-stopped

  # HTTPS reverse proxy
  proxy:
    image: nginx:alpine
    container_name: fitebox-proxy
    network_mode: host
    stop_grace_period: 1s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - recorder
    restart: always
