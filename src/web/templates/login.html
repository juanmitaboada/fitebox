<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#0b1622">
    <title>FITEBOX - Login</title>
    <link rel="stylesheet" href="/statics/fitebox.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="/statics/logo_login.png" alt="FITEBOX" class="login-logo-img">
            <div class="login-hint">Enter the key shown on the OLED display</div>

            <div class="form-group">
                <input
                    type="text"
                    id="key-input"
                    class="form-input login-input"
                    maxlength="6"
                    autocomplete="off"
                    autofocus
                    placeholder="------"
                >
            </div>

            <button class="btn btn-primary" id="login-btn" style="margin-top:8px">
                Connect
            </button>

            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <script src="/statics/fitebox.js"></script>
    <script>
        if (FITEBOX.isAuthenticated()) {
            window.location.href = '/dashboard';
        }

        const input = document.getElementById('key-input');
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');

        input.addEventListener('input', () => {
            input.value = input.value.toUpperCase().replace(/[^A-F0-9]/g, '');
        });

        async function doLogin() {
            const key = input.value.trim();
            if (key.length < 6) {
                errorEl.textContent = 'Key must be 6 characters';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Checking...';
            errorEl.textContent = '';

            try {
                const ok = await FITEBOX.authenticate(key);
                if (ok) {
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = 'Invalid key';
                }
            } catch (e) {
                errorEl.textContent = 'Connection error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }

        btn.addEventListener('click', doLogin);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
